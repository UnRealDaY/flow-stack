upstream core_api    { server core-api:4000; }
upstream realtime    { server realtime:4001; }
upstream file_svc    { server file-service:8000; }
upstream payment_svc { server payment:8001; }
upstream frontend    { server frontend:3000; }

server {
    listen 80;
    server_name _;

    client_max_body_size 25M;

    # Frontend — catch-all
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Core API
    location /api/v1/ {
        proxy_pass http://core_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket (realtime)
    location /socket.io/ {
        proxy_pass http://realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    # File service
    location /api/v1/upload/ {
        proxy_pass http://file_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Payment
    location /api/v1/billing/ {
        proxy_pass http://payment_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
